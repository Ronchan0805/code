<!DOCTYPE html>
<html>
<head>
    <title>CSS自定义气泡框</title>
    <style type="text/css">
        * {
            margin: 0;
            padding: 0;
        }
        .border {
            border: 1px solid black;
        }

        #mybox {
            width: 100%;
        }
        .main {   
            width: 150px;
            height: 80px;
            margin: 100px auto;
            background-color: yellow;
            border-radius: 5px;
            position: relative;
        }
        .sanjiao {
            width: 0px;
            border-width: 10px;
            border-style: solid;
            position: absolute;
            left: 30%;
        }
        ._f {
            border-color: transparent transparent black transparent;
            top: -20px;
        }
        ._b {
            border-color: transparent transparent yellow transparent;
            top: -19px;
        }
        /*删除border样式,和class为sanjiao _f的div,即可不显示气泡边框*/
    </style>
</head>
<body>
<div id="mybox">
    <div class="main border">
        <!--构建三角形黑色边框-->
        <div class="sanjiao _f"><!--黑色的内层的三角形--></div>
        <div class="sanjiao _b"><!--黄色的外层的三角形--></div> 
    </div>
</div>
</body>
</html>
