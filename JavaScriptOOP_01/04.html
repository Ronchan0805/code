<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>原型链</title>
</head>
<body>
  <script>
    function Myfunction(name) {
      this.name = name;
      return this;
    }
    Myfunction.prototype.name = 'ron';
    Object.prototype.name = 'RON';

    var obj = new Myfunction('Ron');
    alert(obj.name); // Ron
    // new -> Myfunction -> Object
  </script>
</body>
</html>
