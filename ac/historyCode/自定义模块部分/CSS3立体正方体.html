<!DOCTYPE html>
<html>
<head>
    <title>3d正方体</title>
    <style type="text/css">
        * {
            margin: 0px;
            padding: 0px;
        }
        body {
            perspective: 200px;
        }
        #box {
            margin: 100px auto;
            width: 100px;
            height: 100px;
            position: relative;
            transform-style: preserve-3d;
            transform-origin: center center -50px;
            transition: 4s;
        }
        #box>div {
            width: 100px;
            height: 100px;
            text-align: center;
            line-height: 100px;
            position: absolute;
        }
        #box div:nth-child(1) {
            background-color: red;
        }
        #box div:nth-child(2) {
            background-color: yellow;
            left: -100px;
            transform-origin: right;
            transform: rotateY(-90deg);
        }
        #box div:nth-child(3) {
            background-color: green;
            right: -100px;
            transform-origin: left;
            transform: rotateY(90deg);
        }
        #box div:nth-child(4) {
            background-color: gray;
            top: -100px;
            transform-origin: bottom;
            transform: rotateX(90deg);
        }
        #box div:nth-child(5) {
            background-color: blue;
            top: 100px;
            transform-origin: top;
            transform: rotateX(-90deg);
        }
        #box div:nth-child(6) {
            background-color: pink;
            transform: translateZ(-100px);
        }
        body:hover #box {
            transform: rotateY(360deg);
        }
    </style>
</head>
<body>
    <div id="box">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
    </div>
</body>
</html>
