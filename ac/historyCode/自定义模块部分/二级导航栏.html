<!DOCTYPE html>
<html>
<head>
    <title>二级导航栏</title>
    <style type="text/css">
        *{
            margin: 0px;
            padding: 0px;
        }
        body{
            padding: 5px;
        }
        a{
            text-decoration: none;
        }
        img{
            display: block;
        }
        ul{
            list-style: none;
        }
        #nav{
            width: 100%;
            height: 60px;
            box-sizing: border-box;
            background-color: rgb(84,92,100);
            color: rgb(255,255,255);
            font-size: 15px;
            font-family: Helvetica Neue,Helvetica,PingFang SC,Hiragino Sans GB,Microsoft YaHei,SimSun,sans-serif;
            padding-left: 50px;
        }
        #nav>ul{
            height: 60px;
        }
        #nav>ul>li{
            height: 60px;
            line-height: 60px;
            cursor: pointer;
            text-align: center;
            float: left;
            padding: 0px 20px;
        }
        li a span{
            display: inline-block;
            padding-left: 5px;
            transition: 0.5s;
        }
        #li{
            transition: 0.5s;
        }
        #li:hover a>span{
            transform: rotateZ(180deg);
        }
        #nav>ul>li:hover{
            background-color: rgb(64,70,80);
        }

        #nav_2{
            min-width: 150px;
            position: absolute;
            left: 0px;
            padding-top: 5px;
            height: 0px;
            overflow: hidden;
            transition-property: height;
            transition-duration: .3s;
        }
        #nav_2 ul {
            background-color: rgb(84,92,100);
            padding: 10px 0;
            border-radius: 2px;
        }
        #nav_2 ul li{
            height: 40px;
            line-height: 40px;
            text-align: left;
        }
        #nav_2 ul li:hover{
            background-color: rgb(64,70,80);
        }
        #nav ul #li:hover #nav_2{
            height: 200px; /*缺点是height必须固定*/
        }
    </style>
</head>
<body>
    <div id="nav">
        <ul>
            <li><a>列表项1</a></li>
            <li><a>列表项2</a></li>
            <li id="li" style="position: relative;">
                <a>列表项3<span>^</span></a>
                <div id="nav_2">
                    <ul>
                        <li>子项</li>
                        <li>子项</li>
                        <li>子项</li>
                        <li>子项</li>
                    </ul>
                </div>
            </li>
            <li><a>列表项4</a></li>
        </ul>
    </div>
</body>
</html>
